<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="terminal_win">
    <header>
      <button type="button" class="underscore" onclick="terminal_control(this, 'minimize')"">
        –
      </button>
      <button type="button" class="emoji-btn">
       □
      </button>
      <button type="button" class="emoji-btn2" onclick="terminal_control(this, 'close')">
       ✖
      </button>

    </header>
    <section class="terminal">
      <div class="history">
      </div>
    $&nbsp;<span class="prompt">
    </span>
    <span class="typed-cursor">█
    </span>
    </section>
  </div>
  <script src="./script.js"></script>
</body>
</html>
